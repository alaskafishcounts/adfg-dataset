name: 🐟 ADF&G Data Sync (Daily 6AM - JSON Only)

on:
  schedule:
    - cron: '0 6 * * *'    # Daily at 6:00 AM UTC (10:00 PM AKST)
  workflow_dispatch:  # Manual trigger
    inputs:
      force_update:
        description: 'Force update all files regardless of age'
        required: false
        default: false
        type: boolean
      validate_data:
        description: 'Enable data validation and quality checks after download'
        required: false
        default: true
        type: boolean
      target_year:
        description: 'Target year for data collection (defaults to current year)'
        required: false
        default: ''
        type: string
      year_spec:
        description: 'Years to download: e.g. 1999-2020 or 1999,2021,2023 (overrides target_year)'
        required: false
        default: ''
        type: string
      preset:
        description: 'Preset download scope'
        required: false
        default: 'current-year'
        type: choice
        options:
          - current-year
          - full-1950-present
          - 1950s
          - 1960s
          - 1970s
          - 1980s
          - 1990s
          - 2000s
          - 2010s
          - 2020s
          - southeast
          - southcentral
          - interior
          - western
          - bristol-bay
          - kodiak
          - alaska-peninsula
          - prince-william-sound
          - mat-su
          - kenai-peninsula
  push:
    paths:
      - 'scripts/trigger-data-update.txt'  # Trigger file
  repository_dispatch:
    types: [adfg-data-update]  # External trigger

jobs:
  update-adfg-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # INCREASED FOR RELIABILITY
    name: 🐟 Update ADFG Fish Count Data
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: 📥 Checkout app repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1  # REDUCED FROM 0 TO 1 FOR FASTER CLONE
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
        
    - name: 📁 Clone Data Repository
      env:
        DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      run: |
        # Clone with proper authentication
        git clone --depth 1 https://x-access-token:${DATA_REPO_TOKEN}@github.com/alaskafishcounts/adfg-dataset.git adfg-data
        cd adfg-data
        
        # Configure git for the data repository
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Set up remote with token authentication
        git remote set-url origin https://x-access-token:${DATA_REPO_TOKEN}@github.com/alaskafishcounts/adfg-dataset.git
        
    - name: 🐟 Download ADFG Data
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        FORCE_UPDATE: ${{ github.event.inputs.force_update || 'false' }}
        VALIDATE_DATA: ${{ github.event.inputs.validate_data || 'true' }}
        TARGET_YEAR: ${{ github.event.inputs.target_year || '' }}
      run: |
        cd adfg-data
        # Parse year_spec or preset into TARGET_YEAR iterations
        YEAR_SPEC="${{ github.event.inputs.year_spec }}"
        PRESET="${{ github.event.inputs.preset }}"
        DEFAULT_YEAR="${TARGET_YEAR}"

        parse_range_or_list() {
          input="$1"
          if [ -z "$input" ]; then
            echo ""
            return
          fi
          if echo "$input" | grep -q ","; then
            echo "$input" | tr ',' '\n' | sed 's/ //g'
          elif echo "$input" | grep -q "-"; then
            start=$(echo "$input" | cut -d'-' -f1)
            end=$(echo "$input" | cut -d'-' -f2)
            seq $start $end
          else
            echo "$input"
          fi
        }

        years=""
        if [ -n "$YEAR_SPEC" ]; then
          years=$(parse_range_or_list "$YEAR_SPEC")
        else
          case "$PRESET" in
            full-1950-present) years=$(seq 1950 $(date +%Y));;
            1950s) years=$(seq 1950 1959);;
            1960s) years=$(seq 1960 1969);;
            1970s) years=$(seq 1970 1979);;
            1980s) years=$(seq 1980 1989);;
            1990s) years=$(seq 1990 1999);;
            2000s) years=$(seq 2000 2009);;
            2010s) years=$(seq 2010 2019);;
            2020s) years=$(seq 2020 $(date +%Y));;
            *) years="$DEFAULT_YEAR";;
          esac
        fi

        # Export region filter based on preset (optional)
        case "$PRESET" in
          southeast) export REGION_FILTER="Southeast";;
          southcentral) export REGION_FILTER="Southcentral";;
          interior) export REGION_FILTER="Interior";;
          western) export REGION_FILTER="Western";;
          bristol-bay) export REGION_FILTER="Bristol Bay";;
          kodiak) export REGION_FILTER="Kodiak";;
          alaska-peninsula) export REGION_FILTER="Alaska Peninsula";;
          prince-william-sound) export REGION_FILTER="Prince William Sound";;
          mat-su) export REGION_FILTER="Mat-Su";;
          kenai-peninsula) export REGION_FILTER="Kenai Peninsula";;
          *) export REGION_FILTER="";;
        esac

        echo "Years to process:" $years
        
        # OPTIMIZATION: Add smart skipping for faster processing
        export FAST_MODE="true"
        export SKIP_UNCHANGED="true"
        export BATCH_SIZE="50"
        
        # BULLETPROOF: Add data validation and cleanup
        export VALIDATE_YEAR_MATCH="${{ github.event.inputs.validate_data || 'true' }}"
        export CLEANUP_BAD_FILES="${{ github.event.inputs.validate_data || 'true' }}"
        
        # OPTIMIZATION: Process years in parallel batches for current year
        if [ "$PRESET" = "current-year" ] || [ -n "$DEFAULT_YEAR" ]; then
          echo "🚀 FAST MODE: Processing current year only"
          TARGET_YEAR="$DEFAULT_YEAR" REGION_FILTER="$REGION_FILTER" python3 ../scripts/02-data-management/adfg-data-pipeline.py
        else
          echo "📊 BATCH MODE: Processing multiple years"
          for Y in $years; do
            echo "==== Running pipeline for year $Y ===="
            TARGET_YEAR="$Y" REGION_FILTER="$REGION_FILTER" python3 ../scripts/02-data-management/adfg-data-pipeline.py
          done
        fi
        
    - name: 🔍 Validate Downloaded Data
      if: ${{ github.event.inputs.validate_data != 'false' }}
      run: |
        cd adfg-data
        echo "🔍 Running data validation..."
        python3 ../scripts/02-data-management/adfg-data-pipeline.py --validate-only
        
    - name: 🧹 Cleanup Bad Files
      if: ${{ github.event.inputs.validate_data != 'false' }}
      run: |
        cd adfg-data
        python3 ../scripts/02-data-management/cleanup-bad-files.py
        
    - name: 📊 Generate Data Summary
      run: |
        cd adfg-data
        echo "📊 Data Update Summary:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ✅ JSON data updated locally" >> $GITHUB_STEP_SUMMARY
        echo "**Repository:** alaskafishcounts/adfg-dataset" >> $GITHUB_STEP_SUMMARY
        echo "**Next Step:** Manual FTP deployment via Cyberduck" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📈 Data Flow" >> $GITHUB_STEP_SUMMARY
        echo "ADFG Servers → Local JSON Update → Manual FTP Deployment" >> $GITHUB_STEP_SUMMARY
        
    - name: 📋 Manual Deployment Instructions
      run: |
        echo "## 🚀 Manual Deployment Required" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**JSON data has been updated locally.**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📤 Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. **Download updated JSON files** from local repository" >> $GITHUB_STEP_SUMMARY
        echo "2. **Upload to production server** via Cyberduck FTP app" >> $GITHUB_STEP_SUMMARY
        echo "3. **Verify live site** shows updated data" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 FTP Deployment:" >> $GITHUB_STEP_SUMMARY
        echo "- **Host:** Your production server" >> $GITHUB_STEP_SUMMARY
        echo "- **Method:** Cyberduck app (manual)" >> $GITHUB_STEP_SUMMARY
        echo "- **Files:** Updated JSON data files" >> $GITHUB_STEP_SUMMARY
        
    - name: 📊 Generate Summary Report
      run: |
        echo "## 🐟 ADFG Data Sync Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ✅ JSON data updated locally" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Completed:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔄 Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "1. **JSON Data:** Updated from ADFG servers" >> $GITHUB_STEP_SUMMARY
        echo "2. **Local Storage:** Data saved to local repository" >> $GITHUB_STEP_SUMMARY
        echo "3. **Deployment:** Manual FTP required via Cyberduck" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📈 Data Flow" >> $GITHUB_STEP_SUMMARY
        echo "ADFG Servers → Local JSON Update → Manual FTP Deployment → Live Site" >> $GITHUB_STEP_SUMMARY 